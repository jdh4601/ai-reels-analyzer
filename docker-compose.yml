services:
  app:
    build: .
    container_name: instagram-dashboard
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      # 폰 QR 접속용 서버 주소 (Docker에서는 컨테이너 IP가 아닌 호스트 머신 IP를 지정해야 합니다)
      # 예: LAN_HOST=http://192.168.0.25:3000
      - LAN_HOST=${LAN_HOST:-}
      # .env 파일의 ANTHROPIC_API_KEY를 컨테이너에 주입 (LLM 자막 분석·AI 생성·스크린샷 파싱용)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      # 컨테이너를 날려도 data 폴 더의 데이터는 유지됨
      - ./data:/app/data
    restart: unless-stopped
